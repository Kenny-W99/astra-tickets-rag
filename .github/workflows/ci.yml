name: ci
on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Lint (ruff)
        run: |
          ruff check src
      - name: Import check
        run: |
          python -c "import src.api, src.ingest, src.rag"
      - name: Tests
        run: |
          pytest -q
